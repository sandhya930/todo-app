name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

      - name: Audit for "overdue" status usage
        run: |
          if grep -r '"overdue"' packages/ --include="*.ts" --include="*.tsx" | grep -v "\.test\." | grep -v "\.spec\."; then
            echo "ERROR: 'overdue' status found in source code. This invariant must never be added."
            exit 1
          fi
          echo "Audit passed: no overdue status in source."
